name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - run: pip install ruff

      - name: Render proxy template for linting
        run: |
          python -c "
          import re
          with open('src/proxy.py.tmpl') as f:
              t = f.read()
          # Numeric vars need a real number; string vars need a quoted string
          numeric = {'STREAM_DELAY', 'OLLAMA_TIMEOUT'}
          def repl(m):
              return '0' if m.group(1) in numeric else '\"X\"'
          rendered = re.sub(r'\\\$\{(\w+)\}', repl, t)
          with open('src/proxy_rendered.py', 'w') as f:
              f.write(rendered)
          "

      - name: Lint proxy
        # E501: line too long (template lines exceed 79 chars by design)
        # F541: f-string without placeholders (false positive — ${VAR} placeholders
        #       are present in the real template but stripped during rendering)
        run: ruff check src/proxy_rendered.py --select E,F,W --ignore E501,F541

      - name: Lint tests
        run: ruff check tests/ --select E,F,W --ignore E501

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install pytest

      - run: pytest -v tests/

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f docker/Dockerfile -t datura:ci .
