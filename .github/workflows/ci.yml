name: CI

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "etc/**"
      - "docker/**"
      - "docker-compose.yml"
      - "tests/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "etc/**"
      - "docker/**"
      - "docker-compose.yml"
      - "tests/**"
      - ".github/workflows/ci.yml"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - run: pip install ruff

      - name: Render proxy template for linting
        run: |
          python3 tests/conftest.py

      - name: Lint proxy
        # E501: line too long (template lines exceed 79 chars by design)
        # F541: f-string without placeholders (false positive — ${VAR} placeholders
        #       are present in the real template but stripped during rendering)
        # F401: unused imports — HTTPServer is used in __main__ which is stripped
        # F821: undefined names — OLLAMA_BACKEND and APPROVAL_PHRASES are set in
        #       __main__ which is stripped for linting
        run: ruff check src/proxy_rendered.py --select E,F,W --ignore E501,F541,F401,F821

      - name: Lint tests
        # E402: import not at top — conftest.py delays `import pytest` until after
        #       the CLI entry point so it can run without pytest installed
        run: ruff check tests/ --select E,F,W --ignore E501,E402

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - run: pip install pytest

      - run: pytest -v tests/

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build Docker image
        run: docker build -f docker/Dockerfile -t datura:ci .
