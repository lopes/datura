# Product: Datura
# Category: Honeypot / Deception Technology
# Supported Format: JSONL (one JSON object per line)
# Reference: https://github.com/lopes/datura
# Last Updated: 2026-04-26
##

filter {
  ###
  # 1. DATA EXTRACTION

  json {
    source        => "message"
    array_function => "split_columns"
    on_error      => "_not_json"
  }

  if [_not_json] {
    drop {
      tag => "TAG_MALFORMED_MESSAGE"
    }
  }

  # Validate required Datura field
  if [source_ip] == "" {
    drop {
      tag => "TAG_MALFORMED_DATURA_LOG"
    }
  }

  ###
  # 2. DATA MANIPULATION

  # 2.1 Parse event timestamp
  if [timestamp] != "" {
    date {
      match   => ["timestamp", "ISO8601"]
      target  => "event.idm.read_only_udm.metadata.event_timestamp"
      timezone => "UTC"
    }
  }

  # 2.2 Convert types for string interpolation
  mutate {
    convert => {
      "source_port" => "string"
    }
  }

  if [turn] != "" {
    mutate {
      convert => {
        "turn" => "string"
      }
    }
  }

  # 2.3 Map severity, action, and category from classification level
  if [level] == "leaked" {
    mutate {
      replace => {
        "security_result.severity"         => "HIGH"
        "security_result.action"           => "ALLOW"
        "security_result.category"         => "DATA_EXFILTRATION"
        "security_result.category_details" => "fake_data_exfiltrated"
      }
    }
  } else if [level] == "probe" {
    mutate {
      replace => {
        "security_result.severity"         => "MEDIUM"
        "security_result.action"           => "ALLOW"
        "security_result.category"         => "NETWORK_SUSPICIOUS"
        "security_result.category_details" => "jailbreak_attempt"
      }
    }
  } else if [level] == "denied" {
    mutate {
      replace => {
        "security_result.severity"         => "MEDIUM"
        "security_result.action"           => "BLOCK"
        "security_result.category"         => "POLICY_VIOLATION"
        "security_result.category_details" => "social_engineering_deflected"
      }
    }
  } else if [level] == "recon" {
    mutate {
      replace => {
        "security_result.severity"         => "LOW"
        "security_result.action"           => "ALLOW"
        "security_result.category"         => "NETWORK_RECON"
        "security_result.category_details" => "api_enumeration"
      }
    }
  } else {
    mutate {
      replace => {
        "security_result.severity"         => "INFORMATIONAL"
        "security_result.action"           => "ALLOW"
        "security_result.category"         => "UNKNOWN_CATEGORY"
        "security_result.category_details" => "benign_interaction"
      }
    }
  }

  # 2.4 Extract user prompt from request body
  mutate {
    replace => {
      "datura_user_prompt"   => ""
      "datura_request_model" => ""
      "datura_response_text" => ""
      "datura_api_interface" => ""
    }
  }

  # Ollama API format: request.prompt
  if [request][prompt] != "" {
    mutate {
      replace => {
        "datura_user_prompt" => "%{request.prompt}"
      }
    }
  }

  # OpenAI-compatible format: request.messages array (last user message wins)
  if [request][messages] != "" {
    for index, msg in request.messages {
      if [msg][role] == "user" {
        mutate {
          replace => {
            "datura_user_prompt" => "%{msg.content}"
          }
        }
      }
    }
  }

  # Extract requested model name
  if [request][model] != "" {
    mutate {
      replace => {
        "datura_request_model" => "%{request.model}"
      }
    }
  }

  # 2.5 Extract response text
  # Ollama API format: response.response
  if [response][response] != "" {
    mutate {
      replace => {
        "datura_response_text" => "%{response.response}"
      }
    }
  }

  # OpenAI-compatible format: response.choices[0].message.content
  if [datura_response_text] == "" and [response][choices] != "" {
    mutate {
      replace => {
        "datura_response_text" => "%{response.choices.0.message.content}"
      }
    }
  }

  # Error or raw fallback
  if [datura_response_text] == "" and [response][raw] != "" {
    mutate {
      replace => {
        "datura_response_text" => "%{response.raw}"
      }
    }
  }

  # 2.6 Derive API interface from request path
  if [path] == "/" or [path] == "/index.html" {
    mutate {
      replace => {
        "datura_api_interface" => "web_ui"
      }
    }
  } else if [path] =~ /^\/api\// {
    mutate {
      replace => {
        "datura_api_interface" => "ollama_api"
      }
    }
  } else if [path] =~ /^\/v1\// {
    mutate {
      replace => {
        "datura_api_interface" => "openai_api"
      }
    }
  }

  # 2.7 Build security_result summary and description per level
  if [level] == "leaked" {
    mutate {
      replace => {
        "security_result.summary"     => "Honeypot leaked fake data to %{source_ip} via %{path}"
        "security_result.description" => "Attacker at %{source_ip} social-engineered the Datura honeypot and fake sensitive data was injected into the response. Session: %{session_id}. Prompt: %{datura_user_prompt}"
      }
    }
  } else if [level] == "probe" {
    mutate {
      replace => {
        "security_result.summary"     => "Jailbreak or prompt injection attempt from %{source_ip}"
        "security_result.description" => "Source %{source_ip} attempted a jailbreak or prompt injection against the Datura honeypot via %{path}. Session: %{session_id}. Prompt: %{datura_user_prompt}"
      }
    }
  } else if [level] == "denied" {
    mutate {
      replace => {
        "security_result.summary"     => "Social engineering attempt deflected from %{source_ip}"
        "security_result.description" => "Source %{source_ip} requested sensitive data via %{path} but the honeypot model deflected the request. Session: %{session_id}. Prompt: %{datura_user_prompt}"
      }
    }
  } else if [level] == "recon" {
    mutate {
      replace => {
        "security_result.summary"     => "API reconnaissance from %{source_ip}"
        "security_result.description" => "Source %{source_ip} is probing the Datura honeypot API via %{path}. Session: %{session_id}."
      }
    }
  } else {
    mutate {
      replace => {
        "security_result.summary"     => "Benign interaction from %{source_ip}"
        "security_result.description" => "Standard interaction with the Datura honeypot from %{source_ip} via %{path}."
      }
    }
  }

  ###
  # 3. DATA ASSIGNMENT

  # 3.1 Core UDM metadata
  mutate {
    replace => {
      "event.idm.read_only_udm.metadata.event_type"         => "GENERIC_EVENT"
      "event.idm.read_only_udm.metadata.product_name"       => "Datura"
      "event.idm.read_only_udm.metadata.vendor_name"        => "Datura"
      "event.idm.read_only_udm.metadata.product_event_type" => "%{level}"
      "event.idm.read_only_udm.metadata.description"        => "%{security_result.summary}"
    }
  }

  # 3.2 Principal (attacker / source)
  mutate {
    replace => {
      "event.idm.read_only_udm.principal.ip"   => "%{source_ip}"
      "event.idm.read_only_udm.principal.port"  => "%{source_port}"
    }
  }

  # 3.3 Target (honeypot)
  mutate {
    replace => {
      "event.idm.read_only_udm.target.application" => "Datura"
      "event.idm.read_only_udm.target.url"         => "%{path}"
    }
  }

  # 3.4 Network and HTTP fields
  mutate {
    replace => {
      "event.idm.read_only_udm.network.http.method" => "%{method}"
      "event.idm.read_only_udm.network.session_id"  => "%{session_id}"
    }
  }

  if [user_agent] != "" {
    mutate {
      replace => {
        "event.idm.read_only_udm.network.http.user_agent" => "%{user_agent}"
      }
    }
  }

  # 3.5 Security result
  mutate {
    merge => {
      "event.idm.read_only_udm.security_result" => "security_result"
    }
  }

  ###
  # 3.6 Additional fields for investigation and detection rules

  # Session ID (duplicated here for easy use in YARA-L rules)
  if [session_id] != "" {
    mutate {
      replace => {
        "additional_session_id.key"              => "session_id"
        "additional_session_id.value.string_value" => "%{session_id}"
      }
    }
    mutate {
      merge => {
        "event.idm.read_only_udm.additional.fields" => "additional_session_id"
      }
    }
  }

  # Turn number (conversation progression)
  if [turn] != "" {
    mutate {
      replace => {
        "additional_turn.key"              => "turn"
        "additional_turn.value.string_value" => "%{turn}"
      }
    }
    mutate {
      merge => {
        "event.idm.read_only_udm.additional.fields" => "additional_turn"
      }
    }
  }

  # User prompt (the social engineering text)
  if [datura_user_prompt] != "" {
    mutate {
      replace => {
        "additional_prompt.key"              => "request_prompt"
        "additional_prompt.value.string_value" => "%{datura_user_prompt}"
      }
    }
    mutate {
      merge => {
        "event.idm.read_only_udm.additional.fields" => "additional_prompt"
      }
    }
  }

  # Requested model name
  if [datura_request_model] != "" {
    mutate {
      replace => {
        "additional_model.key"              => "request_model"
        "additional_model.value.string_value" => "%{datura_request_model}"
      }
    }
    mutate {
      merge => {
        "event.idm.read_only_udm.additional.fields" => "additional_model"
      }
    }
  }

  # Response text (what the honeypot returned -- critical for leaked events)
  if [datura_response_text] != "" {
    mutate {
      replace => {
        "additional_response.key"              => "response_text"
        "additional_response.value.string_value" => "%{datura_response_text}"
      }
    }
    mutate {
      merge => {
        "event.idm.read_only_udm.additional.fields" => "additional_response"
      }
    }
  }

  # API interface (web_ui, ollama_api, openai_api)
  if [datura_api_interface] != "" {
    mutate {
      replace => {
        "additional_interface.key"              => "api_interface"
        "additional_interface.value.string_value" => "%{datura_api_interface}"
      }
    }
    mutate {
      merge => {
        "event.idm.read_only_udm.additional.fields" => "additional_interface"
      }
    }
  }

  # Event type (visit, model_list for GET events)
  if [event] != "" {
    mutate {
      replace => {
        "additional_event.key"              => "event"
        "additional_event.value.string_value" => "%{event}"
      }
    }
    mutate {
      merge => {
        "event.idm.read_only_udm.additional.fields" => "additional_event"
      }
    }
  }

  # Backend error message
  if [error] != "" {
    mutate {
      replace => {
        "additional_error.key"              => "error"
        "additional_error.value.string_value" => "%{error}"
      }
    }
    mutate {
      merge => {
        "event.idm.read_only_udm.additional.fields" => "additional_error"
      }
    }
  }

  ###
  # 4. OUTPUT
  mutate {
    merge => {
      "@output" => "event"
    }
  }
}
