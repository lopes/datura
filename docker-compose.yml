services:
  datura:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: datura
    ports:
      - "8080:8080"
      # - "80:8080"       # HTTP on port 80
      # - "443:8443"      # HTTPS on port 443
    volumes:
      - ollama_data:/data/ollama
      - datura_logs:/data/logs
      # Mount a custom config file:
      # - /path/to/custom.env:/app/datura.env:ro
      # Mount a custom UI template:
      # - /path/to/custom.html.tmpl:/app/custom.html.tmpl:ro
      # Mount a custom phrases file:
      # - /path/to/phrases.txt:/app/custom-phrases.txt:ro
      # Mount a corporate CA cert:
      # - /path/to/corporate-ca.pem:/certs/custom-ca.pem:ro
    environment: []
      # Per-variable overrides (take precedence over datura.env):
      # - COMPANY_NAME=Globex Corp
      # - PRODUCT_NAME=GloBot
      # - UI_FILE=custom.html
      # - PHRASES_FILE=/app/custom-phrases.txt
      # - GENERATE_SELF_SIGNED=true
      # - CUSTOM_CA_CERT=/certs/custom-ca.pem
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    restart: unless-stopped

volumes:
  ollama_data:
  datura_logs:
